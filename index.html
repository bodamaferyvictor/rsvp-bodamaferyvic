<script>

let invitados = {};

fetch('invitados.csv')
.then(r => r.text())
.then(data => {

    const filas = data.trim().split('\n');

    for(let i = 1; i < filas.length; i++){

        const columnas = filas[i].split(',');

        const id = columnas[0]?.trim();
        const nombre = columnas[1]?.trim();
        const pases = parseInt(columnas[2]?.trim());

        if(id){
            invitados[id] = {
                nombre: nombre,
                pases: pases
            };
        }
    }

    iniciar();
});

function iniciar(){

    const params = new URLSearchParams(window.location.search);
    const id = params.get("id");

    const invitado = invitados[id];

    if(!invitado){

        document.getElementById("nombre").innerText =
        "Invitación no encontrada";

        return;
    }

    document.getElementById("nombre").innerText = invitado.nombre;

    document.getElementById("pases").innerText =
    "Tienes " + invitado.pases + " pase(s)";

    const select = document.getElementById("asistentes");
    select.innerHTML = "";

    for(let i=0;i<=invitado.pases;i++){

        let option = document.createElement("option");
        option.value = i;
        option.text = i;
        select.appendChild(option);
    }
}

function confirmar(){

    const cantidad = document.getElementById("asistentes").value;

    document.getElementById("mensaje").innerText =
    "¡Gracias por confirmar 💍";
}

</script>
